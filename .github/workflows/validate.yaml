name: validate                                                                                                                                                           
                                                                                                                                                                           
  on:                                                       
    push:
      branches: [main]
    pull_request:

  jobs:
    validate:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4                                                                                                                                        
   
        - name: Set up Python                                                                                                                                              
          uses: actions/setup-python@v5                     
          with:
            python-version: "3.12"
            cache: pip
                                                                                                                                                                           
        - name: Install package
          run: pip install -e ".[dev]"                                                                                                                                     
                                                            
        - name: Lint facet library
          run: crm-facet-lint

        - name: Run tests
          run: pytest -q
