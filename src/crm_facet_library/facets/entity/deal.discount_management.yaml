name: Deal-level discount management
description: Whether the CRM supports one or more named discount records attached to a deal (rather than
  only a single discount field), each individually manageable, allowing complex pricing structures with
  multiple concurrent discount lines.
question: Does the CRM support multiple named discount entries on a single deal record, each independently
  created, updated, and deleted via the API, enabling stacked or itemised discount modelling?
