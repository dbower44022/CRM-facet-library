id: entity.product.variation_management
version: 0.1.0
status: active
name: Product variant / SKU management
description: Whether the CRM supports a native product-variation (SKU) sub-entity, allowing a single product
  record to carry multiple variants with independent pricing or attributes, each manageable via the API
  and attachable to deals.
question: Does the CRM support native product variations (SKUs) as a first-class sub-entity of a product
  record, with each variation independently created, updated, and deleted via the API?
