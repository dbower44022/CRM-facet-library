id: entity.organization.agreement_lifecycle
version: 0.1.0
status: active
name: Organization agreement lifecycle tracking
description: Whether the CRM can attach a date-bound agreement record to an organization entity — capturing
  start date, end date, renewal date, and agreement status — and surface renewal reminders without requiring
  a separate external system or manual calendar tracking.
question: Can the CRM attach a date-bound agreement record to an organization, track its renewal date,
  and trigger reminders when renewal approaches?
answer_schema:
  type: structured
  fields:
    agreement_as_first_class_record:
      type: rating
      allowed_values:
      - full
      - partial
      - workaround
      - none
      - unknown
      scoring_hints:
        full: Agreement is a first-class entity linked to the organization with date, status, and document
          fields natively supported.
        partial: Agreement tracked via custom fields on the organization record, without a dedicated linked
          entity.
        workaround: Achieved only via an external document system or manual notes field.
        none: No agreement tracking capability.
    renewal_reminder:
      type: rating
      allowed_values:
      - full
      - partial
      - workaround
      - none
      - unknown
      scoring_hints:
        full: Platform-native automation fires a reminder N days before the renewal date, configurable
          per agreement.
        partial: Reminders possible but require manual workflow setup per record or are not date-relative.
        workaround: Only achievable via external calendar or task system.
        none: No reminder capability tied to agreement renewal dates.
applies_to:
- entity
- process
tags:
- family:entity
- applies-to:records
- axis:modeling
- crm-dim:entity
examples:
- requirement: Track partnership agreements with community nonprofits, including renewal dates, and alert
    the Partner Coordinator 30 days before expiration
  expected_answer:
    agreement_as_first_class_record: full
    renewal_reminder: full
related_facets:
- entity.relationship.cardinality
- history.relationship.temporal_modeling
- process.trigger.on_field_change
source_hints:
