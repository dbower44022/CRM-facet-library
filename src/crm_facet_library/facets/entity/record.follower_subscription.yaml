id: entity.record.follower_subscription
version: 0.1.0
status: active
name: Per-record follower subscription with changelog
description: Whether the CRM supports a first-class 'follower' relationship that lets any user subscribe
  to updates on a specific record, with an auditable changelog of who followed/unfollowed and when — distinct
  from record ownership.
question: 'Does the CRM support a named ''follower'' subscription model on records (separate from ownership),
  allowing any user to subscribe to a record?

  '
