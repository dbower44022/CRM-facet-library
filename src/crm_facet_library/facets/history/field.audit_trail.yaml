- process.attribution.lifecycle_persistence
- process.outreach.multichannel_with_preference_enforcement
- process.outreach.unified_interaction_history
- process.pipeline.multi_entity_stage_progression
- process.trigger.on_field_change
- ui.portal.self_service_write_back
- workflow.decision_rationale
- workflow.review.per_entity_configurability
- workflow.status_transition_required_fields
