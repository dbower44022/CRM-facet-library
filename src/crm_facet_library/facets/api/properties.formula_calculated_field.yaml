id: api.properties.formula_calculated_field
version: 0.1.0
status: active
name: Formula-Based Calculated Property Definition via API
description: Measures whether the CRM API allows defining properties whose values are computed from a
  formula expression referencing other properties on the same record — with the formula stored on the
  property definition itself and evaluated by the platform, not by the caller.
question: 'Does the CRM API support defining properties with a stored calculation formula that the platform
  evaluates automatically?

  '
answer_schema:
  type: rating
  allowed_values:
  - full
  - partial
  - none
  - unknown
applies_to:
- entity
- cross-cutting
tags:
- family:field
- family:api
- axis:schema-management
- crm-dim:computed-fields
- complexity:medium
- impact:medium
examples:
- requirement: '[evidence from HubSpot] PropertyCreate has calculationFormula:string; Property response
    has calculated:boolean and calculationFormula:string; PropertyUpdate also exposes calculationFormula
    — formula is part of the API-managed property definition'
  expected_answer: full
