id: api.owner.team_membership_and_primary_flag
version: 0.1.0
status: active
name: Owner Team Membership with Primary Team Designation via API
description: Measures whether the CRM API represents record owners as belonging to one or more named teams,
  with one team designated as primary, and exposes this team membership as a queryable attribute on the
  owner record — enabling team-based routing, filtering, and reporting logic to be built on the API.
question: Does the CRM API expose team membership on record owner objects, with support for multiple teams
  per owner and a primary-team flag, queryable without requiring administrative UI access?
