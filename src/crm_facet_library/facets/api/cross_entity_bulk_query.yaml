name: Cross-entity bulk query by ID list
description: Whether the CRM API accepts a comma-separated or array list of record IDs on collection GET
  endpoints to retrieve multiple specific records in a single request, avoiding N individual GETs.
question: Does the CRM API allow fetching multiple specific records of the same type in a single GET request
  by supplying a list of IDs as a query parameter, rather than requiring one request per record?
