id: api.pipeline.write_permissions_per_stage
version: 0.1.0
status: active
name: Per-Stage Write Permission Controls on Pipelines
description: Measures whether pipeline stages carry an explicit write-permission policy that controls
  which actors or roles can move records into that stage — configurable at the stage level rather than
  solely at the pipeline or record-type level.
question: 'Does the CRM support a write-permission policy on individual pipeline stages — controlling
  which roles or actors are allowed to transition a record into that stage — as a first-class attribute
  of?

  '
