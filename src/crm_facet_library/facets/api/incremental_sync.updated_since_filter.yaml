id: api.incremental_sync.updated_since_filter
version: 0.1.0
status: active
name: Incremental sync via updated-since / updated-until time?
description: Whether the CRM's collection API endpoints support `updated_since` and `updated_until` query
  parameters that allow integration consumers to fetch only records modified within a specific time window,
  enabling efficient incremental sync without a full re-fetch.
question: 'Do the CRM''s record collection endpoints support time-window query parameters (e.g., `updated_since`?

  '
