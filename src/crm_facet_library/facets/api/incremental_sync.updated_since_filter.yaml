- requirement: '`GET /persons?updated_since=2026-01-01T00:00:00Z&updated_until=2026-04-01T00:00:00Z` returns
    only persons modified in that window.'
  expected_answer: unknown
- requirement: '`GET /organizations?updated_since=2026-03-01T00:00:00Z` enables delta polling.'
  expected_answer: unknown
